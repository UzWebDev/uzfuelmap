<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fargona Metan Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<style>
body{
margin:0;
font-family:Arial,sans-serif;
}

#map{
height:100vh;
width:100%;
}

.header{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
z-index:1000;
background:white;
padding:12px 20px;
border-radius:15px;
box-shadow:0 3px 15px #777;
font-size:20px;
font-weight:bold;
}
</style>

</head>

<body>

<div class="header">
🚗 Fargona Metan Map
</div>

<div id="map"></div>


<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map=L.map("map").setView(
[40.3864,71.7864],
11
);


L.tileLayer(
"https://tile.openstreetmap.org/{z}/{x}/{y}.png",
{
maxZoom:19
}
).addTo(map);


// Namuna metan zapravkalar

const metan=[
{
name:"Fargona Metan 1",
lat:40.3864,
lng:71.7864,
status:"🟢 Ishlayapti"
},

{
name:"Margilon Metan",
lat:40.4721,
lng:71.7246,
status:"🟢 Ishlayapti"
}

];


metan.forEach(m=>{

L.marker([m.lat,m.lng])
.addTo(map)
.bindPopup(
"<b>🚗 "+m.name+
"</b><br>"+m.status
);

});


</script>

</body>
</html>
